name: IPTV Auto Collector

on:
  # 每天早上 8 点自动采集更新
  schedule:
    - cron: '0 8 * * *'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run IPTV Collector
        run: npm run collect
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Display collection summary
        run: |
          echo "=== 采集结果汇总 ==="
          if [ -f channels.json ]; then
            echo "📊 channels.json 信息:"
            COUNT=$(jq -r '.count // 0' channels.json)
            UPDATE=$(jq -r '.update // "unknown"' channels.json)
            SOURCES=$(jq -r '.sources // 0' channels.json)
            echo "   频道总数: $COUNT"
            echo "   数据来源: $SOURCES 个源"
            echo "   更新时间: $UPDATE"
          else
            echo "❌ channels.json 文件不存在"
          fi

          if [ -f iptv.m3u ]; then
            echo "📱 iptv.m3u 信息:"
            LINES=$(wc -l < iptv.m3u)
            SIZE=$(ls -lh iptv.m3u | awk '{print $5}')
            echo "   文件大小: $SIZE"
            echo "   总行数: $LINES"
          else
            echo "❌ iptv.m3u 文件不存在"
          fi

          if [ -f iptv-valid.m3u ]; then
            echo "✅ iptv-valid.m3u 信息:"
            VALID_LINES=$(wc -l < iptv-valid.m3u)
            VALID_SIZE=$(ls -lh iptv-valid.m3u | awk '{print $5}')
            echo "   文件大小: $VALID_SIZE"
            echo "   总行数: $VALID_LINES"
          else
            echo "❌ iptv-valid.m3u 文件不存在"
          fi

      - name: Test channels (optional)
        run: npm run test
        continue-on-error: true

      - name: Commit and push if changed
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有检测到文件变化，无需提交"
          else
            COUNT=$(jq -r '.count // 0' channels.json 2>/dev/null || echo 0)
            UPDATE_TIME=$(date +'%Y-%m-%d %H:%M')
            COMMIT_MSG="auto: 更新 IPTV 源 $UPDATE_TIME (共 $COUNT 个频道)"
            git commit -m "$COMMIT_MSG"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ 已提交: $COMMIT_MSG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create success summary
        if: always()
        run: |
          if [ "${{ steps.commit.outputs.changed }}" == "true" ]; then
            echo "✅ 采集完成并已提交更新"
          else
            echo "ℹ️ 没有检测到文件变化，无需提交"
          fi
          echo "📅 运行时间: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Archive IPTV files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iptv-files
          path: |
            iptv.m3u
            channels.json            iptv-cn.m3u
            channels-cn.json            iptv-valid.m3u
            channels-valid.json
          retention-days: 7