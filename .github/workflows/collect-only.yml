name: IPTV Auto Collector

on:
  # 每天北京时间 8:00（UTC 0:00）自动采集更新
  schedule:
    - cron: '0 0 * * *'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run IPTV Collector
        run: npm run collect
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Display collection summary
        if: always()
        run: |
          echo "=== 采集结果汇总 ==="
          for f in channels.json channels-cn.json channels-valid.json; do
            if [ -f "$f" ]; then
              COUNT=$(jq -r '.count // 0' "$f")
              UPDATE=$(jq -r '.update // "unknown"' "$f")
              echo "📊 $f: ${COUNT} 个频道, 更新于 $UPDATE"
            fi
          done

          for f in iptv.m3u iptv-cn.m3u iptv-valid.m3u; do
            if [ -f "$f" ]; then
              LINES=$(wc -l < "$f")
              SIZE=$(ls -lh "$f" | awk '{print $5}')
              echo "📱 $f: ${LINES} 行, ${SIZE}"
            fi
          done

      - name: Test channels (optional)
        run: npm run test
        continue-on-error: true

      - name: Commit and push if changed
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有检测到文件变化，无需提交"
          else
            COUNT=$(jq -r '.count // 0' channels.json 2>/dev/null || echo 0)
            CN_COUNT=$(jq -r '.count // 0' channels-cn.json 2>/dev/null || echo 0)
            VALID_COUNT=$(jq -r '.count // 0' channels-valid.json 2>/dev/null || echo 0)
            UPDATE_TIME=$(date +'%Y-%m-%d %H:%M')
            COMMIT_MSG="auto: 更新 IPTV 源 $UPDATE_TIME (全量${COUNT}/国内${CN_COUNT}/有效${VALID_COUNT})"
            git commit -m "$COMMIT_MSG"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ 已提交: $COMMIT_MSG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create success summary
        if: always()
        run: |
          if [ "${{ steps.commit.outputs.changed }}" == "true" ]; then
            echo "✅ 采集完成并已提交更新"
          else
            echo "ℹ️ 没有检测到文件变化，无需提交"
          fi
          echo "📅 运行时间: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Archive IPTV files
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: iptv-files
          path: |
            iptv.m3u
            iptv-cn.m3u
            iptv-valid.m3u
            channels.json
            channels-cn.json
            channels-valid.json
          retention-days: 5

